<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NemoClaw MiniApp</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div id="chat-container">
    <h2>Talk to NemoClaw</h2>
    <div id="output"></div>
    <div id="input-row">
      <input id="inp" type="text" placeholder="Ask something…" autocomplete="off">
      <button id="send">Send</button>
    </div>
  </div>
</body>
</html>
